# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf\; display-message "tmux config reload"

# Meta option to close pain with w and window with W
bind-key -n M-a kill-pane
#bind-key -n M-A kill-window

# make pane full screen with Enter
bind-key Enter resize-pane -Z

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

#set inactive/active window styles
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'

# set the pane border colors 
set -g pane-border-style 'fg=colour235,bg=colour238' 
set -g pane-active-border-style 'fg=colour51,bg=colour236'

# set how long display message is show. 3000 = 3s
set -g display-time 3000
